name: IaC Validate

on:
  pull_request:
    branches: [main]
    paths:
      - bicep/**
      - terraform/**
      - arm/**
      - spoke/**
      - policy/**
      - tools/**
      - .github/workflows/iac-validate.yml
  push:
    branches: [main]
    paths:
      - bicep/**
      - terraform/**
      - arm/**
      - spoke/**
      - policy/**
      - tools/**
      - .github/workflows/iac-validate.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: iac-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bicep-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bicep (Azure CLI bundled)
        run: |
          az bicep install
          az bicep version

      - name: Build all Bicep files
        shell: bash
        run: |
          set -euo pipefail

          search_dirs=()
          for d in bicep spoke/bicep policy; do
            if [ -d "$d" ]; then
              search_dirs+=("$d")
            fi
          done

          if [ ${#search_dirs[@]} -eq 0 ]; then
            echo "::notice::No Bicep source directories found under bicep/, spoke/bicep/, or policy/."
            exit 0
          fi

          mapfile -t files < <(find "${search_dirs[@]}" -type f -name '*.bicep')
          if [ ${#files[@]} -eq 0 ]; then
            echo "::notice::No .bicep files found in configured paths."
            exit 0
          fi

          fail=0
          for f in "${files[@]}"; do
            echo "::group::bicep build $f"
            az bicep build --file "$f" --stdout > /dev/null || fail=1
            echo "::endgroup::"
          done

          exit $fail

  terraform-validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tf_dir:
          - terraform/envs/poc
          - spoke/terraform/examples/app42-prod-eastus
    steps:
      - uses: actions/checkout@v4

      - id: check
        shell: bash
        run: |
          if [ ! -d "${{ matrix.tf_dir }}" ]; then
            echo "exists=false" > "$GITHUB_OUTPUT"
            echo "::notice::skipping ${{ matrix.tf_dir }} (not present)"
          else
            echo "exists=true" > "$GITHUB_OUTPUT"
          fi

      - name: Setup Terraform
        if: steps.check.outputs.exists == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: terraform fmt -check -recursive
        if: steps.check.outputs.exists == 'true'
        run: terraform -chdir="${{ matrix.tf_dir }}" fmt -check -recursive

      - name: terraform init -backend=false
        if: steps.check.outputs.exists == 'true'
        run: terraform -chdir="${{ matrix.tf_dir }}" init -backend=false -input=false

      - name: terraform validate -no-color
        if: steps.check.outputs.exists == 'true'
        run: terraform -chdir="${{ matrix.tf_dir }}" validate -no-color


  tag-mapping-lint:
    name: policy tag-value <-> NG-name lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Run tag-mapping lint
        run: python3 tools/check-tag-mapping.py

  arm-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: check
        shell: bash
        run: |
          if [ ! -f arm/azuredeploy.json ]; then
            echo "exists=false" > "$GITHUB_OUTPUT"
            echo "::notice::skipping arm validation (arm/azuredeploy.json not present)"
          else
            echo "exists=true" > "$GITHUB_OUTPUT"
          fi

      - name: JSON sanity check
        if: steps.check.outputs.exists == 'true'
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r f; do
            echo "::group::jq empty $f"
            jq empty "$f"
            echo "::endgroup::"
          done < <(find arm -type f -name '*.json')

      # Known noisy arm-ttk checks skipped to establish a usable CI baseline:
      # - adminUsername Should Not Be A Literal
      # - apiVersions Should Be Recent In Reference Functions
      - name: arm-ttk validation
        if: steps.check.outputs.exists == 'true'
        shell: bash
        run: |
          pwsh -Command "
            Set-PSRepository -Name PSGallery -InstallationPolicy Trusted;
            Install-Module -Name Pester -Force -Scope CurrentUser -SkipPublisherCheck;
            git clone --depth 1 https://github.com/Azure/arm-ttk.git /tmp/arm-ttk;
            Import-Module /tmp/arm-ttk/arm-ttk/arm-ttk.psd1;
            \$skip = @('adminUsername Should Not Be A Literal', 'apiVersions Should Be Recent In Reference Functions');
            \$result = Test-AzTemplate -TemplatePath arm -Skip \$skip;
            \$result | Format-Table;
            if (\$result | Where-Object { -not \$_.Passed }) { exit 1 } else { exit 0 }
          "

  tag-mapping-lint:
    name: policy tag-value <-> NG-name lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Run tag-mapping lint
        run: python3 tools/check-tag-mapping.py
